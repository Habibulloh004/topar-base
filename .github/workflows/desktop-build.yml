name: Build Desktop App

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: desktop-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact_name: topar-desktop-macos
            artifact_paths: |
              topar-desktop/src-tauri/target/release/bundle/dmg/*.dmg
              topar-desktop/src-tauri/target/release/bundle/macos/*.app
          - os: windows-latest
            artifact_name: topar-desktop-windows
            artifact_paths: |
              topar-desktop/src-tauri/target/release/bundle/msi/*.msi
              topar-desktop/src-tauri/target/release/bundle/nsis/*.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: topar-desktop/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache Rust builds
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            topar-desktop/src-tauri -> target

      - name: Install dependencies
        working-directory: topar-desktop
        run: npm ci

      - name: Build production desktop app
        working-directory: topar-desktop
        run: npm run tauri:build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_paths }}
          if-no-files-found: error
