<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Topar Parser Админ</title>
    <script>
      if (!window.location.pathname.endsWith("/")) {
        window.location.replace(`${window.location.pathname}/${window.location.search}${window.location.hash}`);
      }
    </script>
    <link rel="stylesheet" href="./styles.css?v=20260307-2" />
  </head>
  <body>
    <div class="background"></div>
    <main class="app-shell">
      <header class="hero">
        <h1>Панель управления Topar Parser</h1>
        <p>Парсинг URL -> сопоставление полей -> синхронизация в Все + Основные товары</p>
      </header>

      <section class="card parse-card">
        <form id="parse-form" class="parse-grid">
          <label>
            URL источника
            <input id="source-url" name="sourceUrl" type="url" placeholder="https://example.com/" required />
          </label>
          <label>
            Лимит
            <input id="limit" name="limit" type="number" min="1" max="20000" placeholder="пусто = полный парсинг" />
          </label>
          <label>
            Потоки
            <input id="workers" name="workers" type="number" value="1" min="1" max="4" />
          </label>
          <label>
            Запросов/сек
            <input id="rps" name="requestsPerSec" type="number" value="3" min="1" max="20" step="0.1" />
          </label>
          <button id="parse-btn" class="primary" type="submit">Запустить парсинг</button>
          <button id="clear-btn" class="ghost" type="button">Очистить</button>
        </form>
        <div id="parse-status" class="status"></div>
      </section>

      <section class="card mapping-card">
        <div class="card-head">
          <h2>Сопоставление полей</h2>
        </div>
        <p class="hint">Укажите поле источника или константу для каждого целевого поля. Пример: `gtin` -> `main.barcode`.</p>
        <div id="mapping-table" class="mapping-table"></div>
        <div class="mapping-footer">
          <input id="mapping-name" type="text" placeholder="название маппинга (необязательно)" />
          <button id="save-mapping" type="button" class="ghost">Сохранить маппинг</button>
          <button id="sync-btn" type="button" class="primary">Синхронизировать БД</button>
        </div>
        <div id="sync-status" class="status"></div>
      </section>

      <section class="card">
        <div class="card-head">
          <h2>Пример распарсенных данных</h2>
          <span id="sample-count" class="chip">0 записей</span>
        </div>
        <div id="sample-table-wrap" class="table-wrap"></div>
      </section>
    </main>

    <script src="./app.js?v=20260307-2" type="module"></script>
  </body>
</html>
